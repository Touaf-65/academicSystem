server:
  port: 8097

security:
  internal-secret: my-super-internal-secret

spring:
  application:
    name: planning-service

  datasource:
    url: jdbc:h2:mem:schooling_db
    driverClassName: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

eureka:
  instance:
    prefer-ip-address: true
    hostname: localhost

  client:
    service-url:
      defaultZone: http://localhost:8771/eureka

management:
  endpoints:
    web:
      exposure:
        include: "*"